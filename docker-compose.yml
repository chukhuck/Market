version: '3.8'

services:
  emotionapi:
    build:
      context: .
      dockerfile: FaG.EmotionApi/Dockerfile
    image: fag/emotionapi:latest
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - FAG_DB=Data Source=/var/lib/fag/fag.db
    volumes:
      - ./data/fag:/var/lib/fag
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: FaG.Scheduler/Dockerfile
    image: fag/scheduler:latest
    depends_on:
      - emotionapi
    environment:
      - FAG_DB=Data Source=/var/lib/fag/fag.db
    volumes:
      - ./data/fag:/var/lib/fag
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: FaG.Web/Dockerfile
    image: fag/web:latest
    ports:
      - "8080:80"
    depends_on:
      - emotionapi
    restart: unless-stopped